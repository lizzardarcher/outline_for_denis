
<header class="admx-navbar px-4 py-3 d-flex align-items-center justify-content-between gap-3">
    <div class="d-flex align-items-start min-w-0 flex-grow-1">
        <button type="button"
                class="btn btn-outline-light border-secondary admx-sidebar-toggle flex-shrink-0 me-3 mt-1"
                data-admx-sidebar-toggle
                aria-expanded="false"
                aria-controls="admx-sidebar"
                aria-label="Открыть меню навигации">
            <i class="bi bi-list fs-4 lh-1 d-block" aria-hidden="true"></i>
        </button>
        <div class="min-w-0">
            <h1 class="h5 mb-1 text-truncate">{{ page_title|default:"AdminDashboardX" }}</h1>
            <div class="small text-secondary-emphasis">Период: последние {{ period_days|default:30 }} дней</div>
        </div>
    </div>
    <div class="d-flex align-items-center gap-2 flex-shrink-0">
        <form class="d-none d-md-flex align-items-center gap-1" method="get" action="{% url 'admindashboardx:global_search' %}" role="search">
            <label class="visually-hidden" for="admx-global-search-q">Поиск по админке</label>
            <input id="admx-global-search-q" type="search" name="q" class="form-control form-control-sm"
                   style="min-width: 10rem; max-width: 14rem;" placeholder="ID, user_id, текст…"
                   value="{{ request.GET.q|default:'' }}" autocomplete="off">
            <button type="submit" class="btn btn-sm btn-outline-light" title="Найти">
                <i class="bi bi-search" aria-hidden="true"></i>
            </button>
        </form>
        {% if request.user.is_authenticated %}
            <span class="badge text-bg-secondary">{{ request.user.username }}</span>
        {% else %}
            <span class="badge text-bg-warning">URL only mode</span>
        {% endif %}
    </div>
</header>
