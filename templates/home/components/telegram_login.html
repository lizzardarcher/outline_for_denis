<div class="mt-3">
    <p class="text-muted small mb-2">Вход через Telegram</p>
    <div id="tg-widget-wrap" class="d-flex justify-content-center align-items-center flex-column min-h-50">
        {% if telegram_bot_username %}
            <script async src="https://telegram.org/js/telegram-widget.js?22"
                    data-telegram-login="{{ telegram_bot_username }}"
                    data-size="large"
                    data-radius="10"
                    data-auth-url="{% url 'telegram_login' %}"
                    data-request-access="write">
            </script>
        {% endif %}
    </div>
    <noscript>
        <div class="alert alert-warning small mt-2">
            Включите JavaScript для кнопки Telegram или
            <a href="https://t.me/{{ telegram_bot_username }}" target="_blank" rel="noopener">откройте бота</a>
            и отправьте <code>/getlogin</code>.
        </div>
    </noscript>
    <div id="tg-widget-fallback" class="mt-3" style="display: none;" aria-live="polite">
        <p class="small text-muted mb-2">Не отображается кнопка «Войти через Telegram»?</p>
        <a class="btn btn-outline-primary btn-sm"
           href="https://t.me/{{ telegram_bot_username }}"
           target="_blank"
           rel="noopener noreferrer">
            Перейти в Telegram-бота
        </a>
        <p class="small text-muted mt-2 mb-0">
            В боте выполните <code>/getlogin</code> или откройте в профиле «Доступ к сайту» — там будут логин и пароль для входа по email.
        </p>
    </div>
</div>
<script>
(function () {
    var wrap = document.getElementById('tg-widget-wrap');
    var fb = document.getElementById('tg-widget-fallback');
    if (!wrap || !fb) return;
    function widgetPresent() {
        return !!wrap.querySelector('iframe');
    }
    function check() {
        if (!widgetPresent()) {
            fb.style.display = 'block';
        }
    }
    setTimeout(check, 2500);
    setTimeout(check, 5500);
})();
</script>
